name: Northbound Mutual Fund AUM Tracker

on:
  workflow_dispatch:
    inputs:
      manager:
        description: "Optional exact manager name to run, for example 摩根基金(亚洲)"
        required: false
        type: string
  schedule:
    - cron: "10 1 * * 1"

permissions:
  contents: write

concurrency:
  group: northbound-mutual-fund-aum-tracker
  cancel-in-progress: false

jobs:
  track-aum:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run tracker
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.manager }}" ]; then
            northbound-aum-tracker --manager "${{ inputs.manager }}"
          else
            northbound-aum-tracker
          fi

      - name: Commit outputs
        shell: bash
        run: |
          set -euo pipefail
          if git status --short -- outputs | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add outputs
            git commit -m "chore: update northbound mutual fund AUM"
            git push
          else
            echo "No output changes to commit."
          fi

